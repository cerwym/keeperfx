; KeeperFX Achievements Configuration file for Keeper Original Campaign
; This file defines achievements that can be unlocked during gameplay

; ==============================================================================
; ACHIEVEMENT DEFINITION EXAMPLE - Shows all possible fields and conditions
; ==============================================================================

; Achievement: Slap an imp
ACHIEVEMENT imp_slapped
    ; === Basic Properties ===
    ; NAME "Imp Slapper"                    ; Direct name (optional, overridden by NAME_TEXT_ID)
    ; DESCRIPTION "Slap your first imp"     ; Direct description (optional, overridden by DESC_TEXT_ID)
    NAME_TEXT_ID 1088                       ; String ID for localized name (preferred)
    DESC_TEXT_ID 1089                       ; String ID for localized description (preferred)
    POINTS 10                              ; Achievement point value (Gamerscore, Trophy points, etc.)
    HIDDEN 0                               ; 0 = visible, 1 = hidden until unlocked
    ; ICON_PATH "data/achievement_imp.png" ; Custom icon path (optional)
    ; ICON_SPRITE 42                       ; Custom sprite index (optional, 0 = default trophy icon)
    
    ; === Level Conditions ===
    ; LEVEL 1                              ; Only available on specific level
    ; LEVEL_RANGE 1 5                      ; Available on levels 1-5
    ; COMPLETE_LEVEL                       ; Must complete the level to unlock
    ; LEVEL_TIME_UNDER 300                 ; Must complete level in under 300 seconds (5 minutes)
    
    ; === Creature Conditions ===
    CREATURE_USED 23                       ; Must have creature model 23 (Imp)
    ; ONLY_CREATURE 23                     ; Can ONLY use this creature type (challenge mode)
    ; MIN_CREATURES 23 5                   ; Must have at least 5 of creature model 23
    ; MAX_CREATURES 23 1                   ; Cannot have more than 1 of creature model 23
    ; CREATURE_KILL 26                     ; Must kill creature model 26 (Avatar)
    ; NO_CREATURE_DEATHS                   ; No friendly creatures can die
    
    ; === Combat Conditions ===
    ; MAX_SLAPS 1                          ; Maximum slaps allowed (for challenge)
    ; MIN_KILLS 10                         ; Must kill at least 10 enemies
    ; BATTLES_WON 3                        ; Must win 3 battles
    ; HEARTS_DESTROYED 1                   ; Must destroy 1 enemy dungeon heart
    
    ; === Resource Conditions ===
    ; MAX_GOLD_SPENT 5000                  ; Cannot spend more than 5000 gold
    ; MIN_GOLD 10000                       ; Must maintain at least 10000 gold
    ; TERRITORY_SIZE 100                   ; Must control 100 tiles
    
    ; === Dungeon Conditions ===
    ; ROOM_REQUIRED 2                      ; Must have room kind 2 (e.g., Training Room)
    ; ROOM_FORBIDDEN 5                     ; Cannot build room kind 5 (e.g., Prison)
    ; SPELL_FORBIDDEN 3                    ; Cannot use spell kind 3
    ; TRAP_USED 1                          ; Must use trap kind 1
    
    ; === Custom/Script Conditions ===
    ; SCRIPT_FLAG 42                       ; Custom flag set by level script
    ; LUA_CONDITION "check_special_event"  ; Lua callback function name
    
END_ACHIEVEMENT

; ==============================================================================
; CAMPAIGN ACHIEVEMENTS
; ==============================================================================

; Achievement: Dig your first gold
ACHIEVEMENT gold_digger
    NAME_TEXT_ID 1082
    DESC_TEXT_ID 1083
    POINTS 15
    HIDDEN 0
    LEVEL 1
    ; Uses PLAYER0,FLAG2 which is set when any gold is mined (TOTAL_GOLD_MINED > 0)
    ; See map00001.txt lines 94-96
    SCRIPT_FLAG 2
END_ACHIEVEMENT

; Achievement: Build a treasure room
ACHIEVEMENT treasure_hoarder
    NAME_TEXT_ID 1084
    DESC_TEXT_ID 1085
    POINTS 20
    HIDDEN 0
    LEVEL 1
    ROOM_REQUIRED 2
    ; Room kind 2 is Treasure Room (RoK_TREASURE)
END_ACHIEVEMENT

; Achievement: Claim the portal
ACHIEVEMENT portal_master
    NAME_TEXT_ID 1086
    DESC_TEXT_ID 1087
    POINTS 25
    HIDDEN 0
    LEVEL 1
    ROOM_REQUIRED 4
    ; Room kind 4 is Portal/Entrance (RoK_ENTRANCE)
END_ACHIEVEMENT

