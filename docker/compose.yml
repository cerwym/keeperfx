# Docker Compose for local KeeperFX development.
# All services mount the repository root as /src (read-write).
# Build output lands in out/build/<preset>/ on the host.
#
# Usage:
#   docker compose run mingw32 bash -c "cmake --preset windows-x86-release && cmake --build --preset windows-x86-release"
#   docker compose run linux   bash -c "cmake --preset linux-x64-release   && cmake --build --preset linux-x64-release"
#   docker compose run wasm    bash -c "cmake --preset wasm-release         && cmake --build --preset wasm-release"
#   docker compose pull                          # Update all images
#
# Packaging (linux only — packaging tools are Linux-based):
#   docker compose run linux bash -c "make pkg-gfx"
#   docker compose run linux bash -c "make pkg-lang"
#
# Vita crash parsing:
#   docker compose run vitasdk bash -c "arm-vita-eabi-addr2line -e out/build/vita-debug/keeperfx -fCa 0x81XXXXXX"

name: keeperfx

x-build-base: &build-base
  working_dir: /src
  volumes:
    - type: bind
      source: ..
      target: /src
  environment:
    CMAKE_BUILD_PARALLEL_LEVEL: "${CMAKE_BUILD_PARALLEL_LEVEL:-4}"

services:

  mingw32:
    <<: *build-base
    image: ghcr.io/${DOCKER_ORG:-cerwym}/keeperfx-build-mingw32:latest

  mingw64:
    <<: *build-base
    image: ghcr.io/${DOCKER_ORG:-cerwym}/keeperfx-build-mingw64:latest

  linux:
    <<: *build-base
    image: ghcr.io/${DOCKER_ORG:-cerwym}/keeperfx-build-linux:latest

  wasm:
    <<: *build-base
    image: ghcr.io/${DOCKER_ORG:-cerwym}/keeperfx-build-wasm:latest

  vitasdk:
    <<: *build-base
    build:
      context: ..
      dockerfile: docker/vitasdk/Dockerfile
    image: ghcr.io/${DOCKER_ORG:-cerwym}/build-vitasdk:latest
